name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

env:
  NODE_VERSION: 20.x

jobs:
  install:
    name: install
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ubuntu-node20-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ubuntu-node20-${{ hashFiles('package-lock.json') }}

      - name: Ensure dependencies are available
        run: |
          if [ ! -d node_modules ]; then
            npm ci
          fi

      - name: Run lint
        run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ubuntu-node20-${{ hashFiles('package-lock.json') }}

      - name: Ensure dependencies are available
        run: |
          if [ ! -d node_modules ]; then
            npm ci
          fi

      - name: Run typecheck
        run: npm run typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
    permissions:
      contents: read
    env:
      EXPO_PUBLIC_APP_ENV: staging
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ubuntu-node20-${{ hashFiles('package-lock.json') }}

      - name: Ensure dependencies are available
        run: |
          if [ ! -d node_modules ]; then
            npm ci
          fi

      - name: Validate CI environment variables
        run: node scripts/validateCiEnv.cjs

      - name: Run tests
        run: npm test

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    env:
      EXPO_PUBLIC_APP_ENV: staging
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ubuntu-node20-${{ hashFiles('package-lock.json') }}

      - name: Ensure dependencies are available
        run: |
          if [ ! -d node_modules ]; then
            npm ci
          fi

      - name: Validate EAS CLI availability
        run: npx eas-cli --version

      - name: Build managed app bundle
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # EAS build is attempted first so CI matches the managed Expo workflow.
          # If EAS is unavailable in Wave 0 (for example, missing auth or plan limits),
          # we fall back to `expo export` to keep bundle compilation validated.
          if npx eas-cli build --platform all --non-interactive --no-wait; then
            echo "EAS build queued successfully."
          else
            echo "Falling back to expo export after EAS build attempt failed."
            npx expo export --platform all --output-dir dist
          fi

  lint-and-typecheck:
    name: lint-and-typecheck
    if: always()
    runs-on: ubuntu-latest
    needs:
      - install
      - lint
      - typecheck
      - test
      - build
    steps:
      - name: Enforce required CI result
        run: |
          for result in \
            "${{ needs.install.result }}" \
            "${{ needs.lint.result }}" \
            "${{ needs.typecheck.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.build.result }}"; do
            if [ "$result" != "success" ]; then
              echo "Pipeline stage failed with status: $result"
              exit 1
            fi
          done
